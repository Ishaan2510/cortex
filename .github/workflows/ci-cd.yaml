name: CI/CD Pipeline

on:
  push:
    branches: [kubernetes]

env:
  DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
  IMAGE_BACKEND: ishaan102/ai-task-platform-backend
  IMAGE_WORKER: ishaan102/ai-task-platform-worker
  IMAGE_FRONTEND: ishaan102/ai-task-platform-frontend

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npx eslint src/ --ext .js --max-warnings 0 || true

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint || true

  build-and-push:
    name: Build and Push Images
    runs-on: ubuntu-latest
    needs: lint
    outputs:
      image_tag: ${{ steps.tag.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate image tag
        id: tag
        run: echo "tag=${GITHUB_SHA::7}" >> $GITHUB_OUTPUT

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push backend
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_BACKEND }}:latest
            ${{ env.IMAGE_BACKEND }}:${{ steps.tag.outputs.tag }}

      - name: Build and push worker
        uses: docker/build-push-action@v5
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.IMAGE_WORKER }}:latest
            ${{ env.IMAGE_WORKER }}:${{ steps.tag.outputs.tag }}

      - name: Build and push frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_FRONTEND }}:latest
            ${{ env.IMAGE_FRONTEND }}:${{ steps.tag.outputs.tag }}

  update-infra:
    name: Update Infra Repo
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: Ishaan2510/ai-task-platform-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}

      - name: Update image tags
        run: |
          TAG=${{ needs.build-and-push.outputs.image_tag }}
          sed -i "s|ishaan102/ai-task-platform-backend:.*|ishaan102/ai-task-platform-backend:${TAG}|g" k8s/backend/deployment.yaml
          sed -i "s|ishaan102/ai-task-platform-worker:.*|ishaan102/ai-task-platform-worker:${TAG}|g" k8s/worker/deployment.yaml
          sed -i "s|ishaan102/ai-task-platform-frontend:.*|ishaan102/ai-task-platform-frontend:${TAG}|g" k8s/frontend/deployment.yaml

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/backend/deployment.yaml k8s/worker/deployment.yaml k8s/frontend/deployment.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ needs.build-and-push.outputs.image_tag }}"
          git push