name: Lint
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - working-directory: backend
        run: npm ci && npx eslint src/ --ext .js --max-warnings 0
      - working-directory: frontend
        run: npm ci && npm run lint