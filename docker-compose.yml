version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: atp_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: adminpass
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    container_name: atp_redis
    restart: unless-stopped
    ports:
      - "6379:6379"

  backend:
    build: ./backend
    container_name: atp_backend
    restart: unless-stopped
    env_file: ./backend/.env
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - redis

  worker:
    build: ./worker
    container_name: atp_worker
    restart: unless-stopped
    env_file: ./worker/.env
    depends_on:
      - mongodb
      - redis

  frontend:
    build: ./frontend
    container_name: atp_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo_data: